<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar Senha - Sistema de Processos</title>
    <!-- Protocol Detector - MUST be first to catch HTTPS access -->
    <script src="/js/protocol-detector.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>🔐 Trocar Senha</h1>
                <p>Altere sua senha de acesso</p>
            </div>

            <form id="trocarSenhaForm">
                <div class="form-group">
                    <label for="senhaAtual" class="form-label required">Senha Atual</label>
                    <input 
                        type="password" 
                        id="senhaAtual" 
                        class="form-control" 
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="form-group">
                    <label for="novaSenha" class="form-label required">Nova Senha</label>
                    <input 
                        type="password" 
                        id="novaSenha" 
                        class="form-control" 
                        placeholder="••••••••"
                        required
                        autocomplete="new-password"
                    >
                    <div class="password-strength">
                        <div id="strengthBar" class="password-strength-bar"></div>
                    </div>
                    <span id="strengthText" class="form-text">A senha deve ter no mínimo 8 caracteres</span>
                </div>

                <div class="form-group">
                    <label for="confirmarSenha" class="form-label required">Confirmar Nova Senha</label>
                    <input 
                        type="password" 
                        id="confirmarSenha" 
                        class="form-control" 
                        placeholder="••••••••"
                        required
                        autocomplete="new-password"
                    >
                    <span id="matchText" class="form-text"></span>
                </div>

                <div class="alert alert-info">
                    <strong>Requisitos da senha:</strong>
                    <ul style="margin: var(--spacing-sm) 0 0 var(--spacing-lg); padding: 0;">
                        <li>Mínimo de 8 caracteres</li>
                        <li>Pelo menos uma letra maiúscula</li>
                        <li>Pelo menos uma letra minúscula</li>
                        <li>Pelo menos um número</li>
                    </ul>
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-block" id="trocarBtn">
                    <span id="trocarBtnText">Trocar Senha</span>
                    <span id="trocarBtnLoading" style="display: none;" class="loading"></span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="/admin.html" class="text-primary">Voltar ao painel</a>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const novaSenhaInput = document.getElementById('novaSenha');
        const confirmarSenhaInput = document.getElementById('confirmarSenha');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        const matchText = document.getElementById('matchText');
        const form = document.getElementById('trocarSenhaForm');

        // Password strength checker
        novaSenhaInput.addEventListener('input', () => {
            const senha = novaSenhaInput.value;
            const strength = calculatePasswordStrength(senha);
            
            strengthBar.className = 'password-strength-bar';
            
            if (strength.score === 0) {
                strengthBar.style.width = '0%';
                strengthText.textContent = 'A senha deve ter no mínimo 8 caracteres';
                strengthText.style.color = 'var(--text-secondary)';
            } else if (strength.score === 1) {
                strengthBar.classList.add('weak');
                strengthText.textContent = 'Senha fraca - adicione mais caracteres';
                strengthText.style.color = 'var(--error-color)';
            } else if (strength.score === 2) {
                strengthBar.classList.add('medium');
                strengthText.textContent = 'Senha média - pode melhorar';
                strengthText.style.color = 'var(--warning-color)';
            } else {
                strengthBar.classList.add('strong');
                strengthText.textContent = 'Senha forte!';
                strengthText.style.color = 'var(--success-color)';
            }

            checkPasswordMatch();
        });

        // Password match checker
        confirmarSenhaInput.addEventListener('input', checkPasswordMatch);

        function checkPasswordMatch() {
            const nova = novaSenhaInput.value;
            const confirma = confirmarSenhaInput.value;

            if (!confirma) {
                matchText.textContent = '';
                return;
            }

            if (nova === confirma) {
                matchText.textContent = '✓ As senhas coincidem';
                matchText.style.color = 'var(--success-color)';
            } else {
                matchText.textContent = '✗ As senhas não coincidem';
                matchText.style.color = 'var(--error-color)';
            }
        }

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const senhaAtual = document.getElementById('senhaAtual').value;
            const novaSenha = novaSenhaInput.value;
            const confirmarSenha = confirmarSenhaInput.value;

            // Validate
            if (novaSenha !== confirmarSenha) {
                showToast('As senhas não coincidem', 'error');
                return;
            }

            const strength = calculatePasswordStrength(novaSenha);
            if (strength.score < 2) {
                showToast('A senha é muito fraca. Use uma senha mais forte.', 'error');
                return;
            }

            const btn = document.getElementById('trocarBtn');
            const btnText = document.getElementById('trocarBtnText');
            const btnLoading = document.getElementById('trocarBtnLoading');

            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline-block';

            try {
                const response = await api('/api/auth/trocar-senha', 'POST', {
                    senhaAtual,
                    novaSenha
                });

                if (response.success) {
                    showToast('Senha alterada com sucesso!', 'success');
                    form.reset();
                    strengthBar.className = 'password-strength-bar';
                    strengthText.textContent = 'A senha deve ter no mínimo 8 caracteres';
                    matchText.textContent = '';
                    
                    setTimeout(() => {
                        window.location.href = '/admin.html';
                    }, 1500);
                } else {
                    showToast(response.message || 'Erro ao trocar senha', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast(error.message || 'Erro ao trocar senha', 'error');
            } finally {
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        });

        // Check authentication
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const user = await checkAuth();
                if (!user) {
                    window.location.href = '/login.html';
                }
            } catch (error) {
                window.location.href = '/login.html';
            }
        });
    </script>
</body>
</html>
