<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Pública - Processos Jurídicos</title>
    
    <!-- Suppress browser extension errors - must be first script -->
    <script>
        (function() {
            var originalError = console.error;
            console.error = function() {
                var args = Array.prototype.slice.call(arguments);
                var message = args.join(' ');
                if (message.indexOf('chrome-extension://') !== -1 ||
                    message.indexOf('message channel closed') !== -1 ||
                    message.indexOf('dynamically imported module') !== -1) {
                    return;
                }
                originalError.apply(console, arguments);
            };
            
            window.addEventListener('error', function(e) {
                if (e.filename && e.filename.indexOf('chrome-extension://') === 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    e.stopImmediatePropagation();
                    return false;
                }
            }, true);
            
            window.addEventListener('unhandledrejection', function(e) {
                if (e.reason) {
                    var message = e.reason.message || e.reason.toString();
                    if (message.indexOf('chrome-extension://') !== -1 ||
                        message.indexOf('message channel closed') !== -1 ||
                        message.indexOf('dynamically imported module') !== -1) {
                        e.preventDefault();
                        e.stopPropagation();
                        e.stopImmediatePropagation();
                        return false;
                    }
                }
            }, true);
        })();
    </script>
    
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .consulta-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .consulta-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .consulta-header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .consulta-header p {
            color: #666;
            font-size: 1.1em;
        }

        .search-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .search-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-search {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .search-hint {
            margin-top: 15px;
            color: #666;
            font-size: 0.9em;
        }

        .result-container {
            margin-top: 30px;
        }

        .process-result {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .process-header-result {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .process-number-result {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
        }

        .status-badge-result {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .process-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item-result {
            display: flex;
            flex-direction: column;
        }

        .info-label-result {
            font-weight: 600;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .info-value-result {
            color: #333;
            font-size: 1em;
        }

        .movimentacoes-section {
            margin-top: 25px;
        }

        .movimentacoes-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 15px;
        }

        .movimentacao-card {
            background: #f8f9fa;
            padding: 15px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .movimentacao-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .movimentacao-tipo {
            font-weight: 600;
            color: #667eea;
        }

        .movimentacao-data {
            color: #666;
            font-size: 0.9em;
        }

        .movimentacao-desc {
            color: #555;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2em;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        /* Responsive Design - Mobile First */
        
        /* Extra Small Devices (Mobile Portrait < 375px) */
        @media (max-width: 374px) {
            .consulta-container {
                padding: 20px 10px;
            }

            .consulta-header {
                margin-bottom: 25px;
            }

            .consulta-header h1 {
                font-size: 1.6em;
            }

            .consulta-header p {
                font-size: 0.9em;
            }

            .search-box {
                padding: 20px 15px;
            }

            .search-form {
                flex-direction: column;
                gap: 12px;
            }

            .search-input {
                min-width: 100%;
                padding: 12px 15px;
                font-size: 16px; /* Previne zoom no iOS */
            }

            .btn-search {
                padding: 14px 30px;
                font-size: 1em;
                width: 100%;
                min-height: 48px;
            }

            .process-result {
                padding: 20px 15px;
            }

            .process-header-result {
                flex-direction: column;
                gap: 10px;
            }

            .process-number-result {
                font-size: 1.1em;
                word-break: break-all;
            }

            .process-info-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .movimentacao-header {
                flex-direction: column;
                gap: 5px;
            }

            .back-link a {
                display: inline-block;
                padding: 10px;
                min-height: 44px;
            }
        }

        /* Small Devices (Mobile 375px - 575px) */
        @media (min-width: 375px) and (max-width: 575px) {
            .consulta-container {
                padding: 30px 15px;
            }

            .consulta-header h1 {
                font-size: 1.8em;
            }

            .search-form {
                flex-direction: column;
            }

            .search-input {
                min-width: 100%;
                font-size: 16px;
            }

            .btn-search {
                width: 100%;
                min-height: 48px;
            }

            .process-header-result {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .process-info-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Medium Devices (Tablets Portrait 576px - 767px) */
        @media (min-width: 576px) and (max-width: 767px) {
            .consulta-header h1 {
                font-size: 2.2em;
            }

            .search-form {
                flex-direction: row;
            }

            .search-input {
                min-width: 60%;
            }

            .btn-search {
                flex: 1;
            }

            .process-info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Tablets (768px - 991px) */
        @media (min-width: 768px) and (max-width: 991px) {
            .consulta-header h1 {
                font-size: 2.3em;
            }

            .process-info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Landscape Mobile (Height < 500px) */
        @media (max-height: 500px) and (orientation: landscape) {
            .consulta-container {
                padding: 20px;
            }

            .consulta-header {
                margin-bottom: 20px;
            }

            .consulta-header h1 {
                font-size: 1.5em;
                margin-bottom: 5px;
            }

            .consulta-header p {
                font-size: 0.9em;
            }

            .search-box {
                padding: 20px;
                margin-bottom: 20px;
            }

            .process-result {
                padding: 20px;
                margin-bottom: 15px;
            }

            .movimentacoes-section {
                margin-top: 15px;
            }
        }

        /* Large Devices (Desktop > 992px) */
        @media (min-width: 992px) {
            .consulta-container {
                padding: 50px 30px;
            }

            .consulta-header h1 {
                font-size: 2.8em;
            }

            .search-box {
                padding: 35px;
            }
        }
    </style>
</head>
<body>
    <div class="consulta-container">
        <div class="consulta-header">
            <h1>🔍 Consulta Pública de Processos</h1>
            <p>Consulte o andamento do seu processo de forma rápida e fácil</p>
        </div>

        <div class="search-box">
            <form id="searchForm" class="search-form">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Digite o número do processo ou seu CPF"
                    required
                >
                <button type="submit" class="btn-search">Buscar</button>
            </form>
            <div class="search-hint">
                💡 Você pode buscar pelo número do processo (ex: 0001234-56.2026.8.00.0001) ou pelo seu CPF
            </div>
        </div>

        <div id="resultContainer"></div>

        <div class="back-link">
            <a href="/login">🔐 Área Administrativa</a>
        </div>
    </div>

    <script>
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const resultContainer = document.getElementById('resultContainer');

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = searchInput.value.trim();

            if (!query) return;

            resultContainer.innerHTML = '<div class="loading">🔄 Buscando processos...</div>';

            try {
                const response = await fetch(`/api/public/consulta/${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    displayResults(data.data);
                } else {
                    resultContainer.innerHTML = `
                        <div class="no-results">
                            <h3>😔 Nenhum processo encontrado</h3>
                            <p>Verifique se o número do processo ou CPF está correto</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Erro:', error);
                resultContainer.innerHTML = `
                    <div class="no-results">
                        <h3>⚠️ Erro ao buscar processos</h3>
                        <p>Por favor, tente novamente mais tarde</p>
                    </div>
                `;
            }
        });

        function displayResults(processos) {
            resultContainer.innerHTML = `
                <div class="result-container">
                    <h2 style="color: #667eea; margin-bottom: 20px;">
                        ${processos.length} processo(s) encontrado(s)
                    </h2>
                    ${processos.map(processo => createProcessCard(processo)).join('')}
                </div>
            `;
        }

        function createProcessCard(processo) {
            const statusClass = processo.status.toLowerCase().replace(/\s+/g, '-');
            
            return `
                <div class="process-result">
                    <div class="process-header-result">
                        <div>
                            <div class="process-number-result">Nº ${escapeHtml(processo.numero_processo)}</div>
                            <div style="margin-top: 5px; color: #666;">${escapeHtml(processo.titulo)}</div>
                        </div>
                        <span class="status-badge status-badge-result status-${statusClass}">
                            ${escapeHtml(processo.status)}
                        </span>
                    </div>

                    <div class="process-info-grid">
                        ${processo.cliente_nome ? `
                        <div class="info-item-result">
                            <span class="info-label-result">Cliente</span>
                            <span class="info-value-result">${escapeHtml(processo.cliente_nome)}</span>
                        </div>
                        ` : ''}
                        <div class="info-item-result">
                            <span class="info-label-result">Autor</span>
                            <span class="info-value-result">${escapeHtml(processo.autor)}</span>
                        </div>
                        <div class="info-item-result">
                            <span class="info-label-result">Réu</span>
                            <span class="info-value-result">${escapeHtml(processo.reu)}</span>
                        </div>
                        <div class="info-item-result">
                            <span class="info-label-result">Data Distribuição</span>
                            <span class="info-value-result">${formatDate(processo.data_distribuicao)}</span>
                        </div>
                        ${processo.vara ? `
                        <div class="info-item-result">
                            <span class="info-label-result">Vara</span>
                            <span class="info-value-result">${escapeHtml(processo.vara)}</span>
                        </div>
                        ` : ''}
                        ${processo.comarca ? `
                        <div class="info-item-result">
                            <span class="info-label-result">Comarca</span>
                            <span class="info-value-result">${escapeHtml(processo.comarca)}</span>
                        </div>
                        ` : ''}
                    </div>

                    ${processo.movimentacoes && processo.movimentacoes.length > 0 ? `
                    <div class="movimentacoes-section">
                        <h3 class="movimentacoes-title">📋 Andamentos do Processo</h3>
                        ${processo.movimentacoes.map(mov => `
                            <div class="movimentacao-card">
                                <div class="movimentacao-header">
                                    <span class="movimentacao-tipo">${escapeHtml(mov.tipo)}</span>
                                    <span class="movimentacao-data">${formatDateTime(mov.data_movimentacao)}</span>
                                </div>
                                <div class="movimentacao-desc">${escapeHtml(mov.descricao)}</div>
                            </div>
                        `).join('')}
                    </div>
                    ` : '<p style="color: #999; font-style: italic;">Nenhuma movimentação registrada ainda.</p>'}
                </div>
            `;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.toString().replace(/[&<>"']/g, m => map[m]);
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR');
        }

        function formatDateTime(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('pt-BR');
        }
    </script>
</body>
</html>
