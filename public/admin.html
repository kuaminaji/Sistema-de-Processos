<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Sistema de Processos</title>
    <!-- Protocol Detector - MUST be first to catch HTTPS access -->
    <script src="/js/protocol-detector.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">⚖️ Processos</div>
                <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#dashboard" class="active" data-section="dashboard">📊 Dashboard</a></li>
                    <li><a href="#processos" data-section="processos">📋 Processos</a></li>
                    <li><a href="#clientes" data-section="clientes">👥 Clientes</a></li>
                    <li><a href="#movimentacoes" data-section="movimentacoes">📝 Movimentações</a></li>
                    <li><a href="#usuarios" data-section="usuarios" data-permission="manage_users">👤 Usuários</a></li>
                    <li><a href="#permissoes" data-section="permissoes" data-permission="manage_permissions">🔐 Permissões</a></li>
                    <li><a href="#auditoria" data-section="auditoria" data-permission="view_audit">📈 Auditoria</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="btn btn-ghost sidebar-toggle" onclick="toggleSidebar()">☰</button>
                    <h1 class="header-title" id="pageTitle">Dashboard</h1>
                </div>
                <div class="header-right">
                    <div class="user-menu" onclick="toggleUserMenu()">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <div class="user-info">
                            <div class="user-name" id="userName">Carregando...</div>
                            <div class="user-role" id="userRole">-</div>
                        </div>
                    </div>
                    <div class="dropdown-menu" id="userMenuDropdown" style="display: none; position: absolute; top: 60px; right: 20px; background: white; border: 1px solid var(--border-color); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); min-width: 200px; z-index: 1000;">
                        <a href="/trocar-senha.html" style="display: block; padding: var(--spacing-md); color: var(--text-color); border-bottom: 1px solid var(--border-color);">🔐 Trocar Senha</a>
                        <a href="/setup-2fa.html" style="display: block; padding: var(--spacing-md); color: var(--text-color); border-bottom: 1px solid var(--border-color);">🔒 Configurar 2FA</a>
                        <a href="#" onclick="logout(); return false;" style="display: block; padding: var(--spacing-md); color: var(--error-color);">🚪 Sair</a>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <main class="content" id="mainContent">
                <!-- Dashboard Section -->
                <section id="dashboardSection" class="content-section active">
                    <!-- Stats -->
                    <div class="stats-grid" id="statsGrid">
                        <!-- Stats will be loaded dynamically -->
                    </div>

                    <!-- Charts & Recent Activity -->
                    <div class="dashboard-grid">
                        <div class="dashboard-item col-8">
                            <div class="card">
                                <div class="card-header">
                                    <h3 class="card-title">Processos por Status</h3>
                                </div>
                                <div class="card-body">
                                    <div class="chart-container">
                                        <canvas id="statusChart"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="dashboard-item col-4">
                            <div class="card">
                                <div class="card-header">
                                    <h3 class="card-title">Atividade Recente</h3>
                                </div>
                                <div class="card-body" id="recentActivity">
                                    <!-- Recent activity will be loaded here -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Actions -->
                    <div class="card mt-3">
                        <div class="card-header">
                            <h3 class="card-title">Ações Rápidas</h3>
                        </div>
                        <div class="card-body">
                            <div class="d-flex gap-2 flex-wrap">
                                <button class="btn btn-primary" onclick="exportData('pdf')">📄 Exportar PDF</button>
                                <button class="btn btn-success" onclick="exportData('excel')">📊 Exportar Excel</button>
                                <button class="btn btn-secondary" onclick="exportData('csv')">📋 Exportar CSV</button>
                                <button class="btn btn-warning" onclick="backupSystem()">💾 Backup do Sistema</button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Other sections will be loaded dynamically by admin.js -->
                <section id="processosSection" class="content-section" style="display: none;"></section>
                <section id="clientesSection" class="content-section" style="display: none;"></section>
                <section id="movimentacoesSection" class="content-section" style="display: none;"></section>
                <section id="usuariosSection" class="content-section" style="display: none;"></section>
                <section id="permissoesSection" class="content-section" style="display: none;"></section>
                <section id="auditoriaSection" class="content-section" style="display: none;"></section>
            </main>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
